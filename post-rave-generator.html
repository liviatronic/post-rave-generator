<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>post rave generator</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>

<body>

  <h1>post rave generator</h1>

  <!-- ═══════════════════════════════════════════════════════════
     THREE-COLUMN CONTROL GRID
     col 1 · setup     – canvas size, audio file, layer images
     col 2 · playback  – transport, recording, export
     col 3 · visuals   – sensitivity, smooth, A/B band controls
     On screens narrower than 860px the columns stack vertically.
════════════════════════════════════════════════════════════ -->
  <div class="panel-grid">

    <!-- ── COL 1: Setup ──────────────────────────────────────── -->
    <div class="panel">
      <p class="panel-title">setup</p>

      <div class="sub-label">canvas</div>
      <div class="row">
        <label>width</label>
        <input type="number" id="canvasW" value="1080" min="1" max="4096" />
      </div>
      <div class="row">
        <label>height</label>
        <input type="number" id="canvasH" value="1350" min="1" max="4096" />
        <button id="applySize" style="margin-left:4px">apply</button>
      </div>

      <div class="sub-label">audio</div>
      <div class="row">
        <label>file</label>
        <input type="file" id="audioFile" accept="audio/*" style="flex:1;min-width:0" />
      </div>
      <div class="row">
        <span id="audioName" class="chip">no file loaded</span>
      </div>

      <div class="sub-label">layers</div>
      <div class="row">
        <label>background</label>
        <input type="file" id="bgFile" accept="image/*,video/webm,video/mp4" style="flex:1;min-width:0" />
      </div>
      <div class="row">
        <label>reactive A</label>
        <input type="file" id="layerAFile" accept="image/*,video/webm,video/mp4" style="flex:1;min-width:0" />
      </div>
      <div class="row">
        <label>reactive B</label>
        <input type="file" id="layerBFile" accept="image/*,video/webm,video/mp4" style="flex:1;min-width:0" />
      </div>
      <div class="row">
        <label>overlay</label>
        <input type="file" id="overlayFile" accept="image/*,video/webm,video/mp4" style="flex:1;min-width:0" />
      </div>
    </div>

    <!-- ── COL 2: Playback & recording ───────────────────────── -->
    <div class="panel">
      <p class="panel-title">playback &amp; record</p>

      <div class="sub-label">transport</div>
      <div class="btn-row">
        <button id="playBtn" disabled>▶ play</button>
        <button id="pauseBtn" disabled>⏸ pause</button>
        <button id="rewindBtn" disabled>⏮ rewind</button>
      </div>
      <div class="row">
        <span id="audioState" class="chip">audio off</span>
      </div>

      <div class="sub-label">recording</div>
      <div class="btn-row">
        <button id="recStart" disabled>● start rec</button>
        <button id="recStop" disabled>■ stop + save</button>
      </div>
      <div class="row">
        <span id="recState" class="chip"></span>
      </div>
      <div class="chip">
        load audio → hit record → hit play.<br>
        exports webm with audio baked in.
      </div>

      <div class="sub-label">export</div>
      <div class="btn-row">
        <button id="saveFrame">save frame (png)</button>
      </div>
    </div>

    <!-- ── COL 3: Visualizer controls ────────────────────────── -->
    <div class="panel">
      <p class="panel-title">visualizer</p>

      <div class="sub-label">global</div>

      <!--
      Sensitivity: 0.10 – 2.00, step 0.05
      Used as a direct multiplier on the normalised FFT value (0–1).
      1.0 = full-scale mapping; below 1.0 = compressed; above 1.0 = amplified.
      The previous control ran 1–20 divided by 4 (0.25–5); this range
      stays within the musically useful 0–2 window with finer steps.
    -->
      <div class="row">
        <label>sensitivity</label>
        <input type="range" id="sens" min="0.1" max="2" step="0.05" value="0.5" />
        <span id="sensVal" class="val">0.50</span>
      </div>

      <!--
      Smooth: 0.000 – 0.995, step 0.005
      One-pole IIR coefficient. Previous max was 0.97 (~33-frame tail);
      0.995 gives ~200 frames (~3 s at 60 fps) — roughly double.
      Attack uses smooth × 0.7 so transients still punch through.
    -->
      <div class="row">
        <label>smooth</label>
        <input type="range" id="smooth" min="0" max="0.995" step="0.005" value="0.88" />
        <span id="smoothVal" class="val">0.880</span>
      </div>

      <!-- Layer A -->
      <div class="sub-label">layer A</div>
      <div class="row">
        <label>band</label>
        <select id="bandA">
          <option value="all">all (rms)</option>
          <option value="0">bass (20–250 hz)</option>
          <option value="1" selected>low-mid (250–500 hz)</option>
          <option value="2">mid (500–2k hz)</option>
          <option value="3">high-mid (2–4k hz)</option>
          <option value="4">high (4–20k hz)</option>
        </select>
      </div>
      <div class="row">
        <label>blend</label>
        <select id="blendA">
          <option value="source-over">normal</option>
          <option value="multiply">multiply</option>
          <option value="darken">darken</option>
          <option value="lighten">lighten</option>
          <option value="screen">screen</option>
          <option value="overlay">overlay</option>
        </select>
      </div>
      <div class="row">
        <label>center r</label>
        <input type="range" id="innerRA" min="0" max="1" step="0.01" value="0.55" />
        <span id="innerRAVal" class="val">0.55</span>
      </div>
      <div class="row">
        <label>fade</label>
        <input type="range" id="fadeLenA" min="0.05" max="1.5" step="0.01" value="0.7" />
        <span id="fadeLenAVal" class="val">0.70</span>
      </div>
      <div class="row">
        <label>min opacity</label>
        <input type="range" id="minOpA" min="0" max="1" step="0.01" value="0.15" />
        <span id="minOpAVal" class="val">0.15</span>
      </div>

      <!-- Layer B -->
      <div class="sub-label">layer B</div>
      <div class="row">
        <label>band</label>
        <select id="bandB">
          <option value="all">all (rms)</option>
          <option value="0">bass (20–250 hz)</option>
          <option value="1">low-mid (250–500 hz)</option>
          <option value="2">mid (500–2k hz)</option>
          <option value="3" selected>high-mid (2–4k hz)</option>
          <option value="4">high (4–20k hz)</option>
        </select>
      </div>
      <div class="row">
        <label>blend</label>
        <select id="blendB">
          <option value="source-over">normal</option>
          <option value="multiply">multiply</option>
          <option value="darken">darken</option>
          <option value="lighten">lighten</option>
          <option value="screen">screen</option>
          <option value="overlay">overlay</option>
        </select>
      </div>
      <div class="row">
        <label>center r</label>
        <input type="range" id="innerRB" min="0" max="1" step="0.01" value="0.55" />
        <span id="innerRBVal" class="val">0.55</span>
      </div>
      <div class="row">
        <label>fade</label>
        <input type="range" id="fadeLenB" min="0.05" max="1.5" step="0.01" value="0.7" />
        <span id="fadeLenBVal" class="val">0.70</span>
      </div>
      <div class="row">
        <label>min opacity</label>
        <input type="range" id="minOpB" min="0" max="1" step="0.01" value="0.15" />
        <span id="minOpBVal" class="val">0.15</span>
      </div>
    </div>

  </div><!-- /panel-grid -->

  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
  <div class="info" id="info">upload images or videos to begin</div>
</body>

</html>
